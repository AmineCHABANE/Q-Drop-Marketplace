<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q-Drop Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white font-mono">

<header class="p-6 border-b border-gray-800">
  <h1 class="text-3xl font-bold text-purple-400">Q-DROP VAULT</h1>
  <p class="text-gray-400">9,99€ Access • 67 Systems</p>
</header>

<section class="p-6">

  <h2 class="text-xl text-cyan-400 mb-4">Projects</h2>

  <div id="projects" class="grid md:grid-cols-3 gap-4"></div>

</section>

<script>
fetch("./data/projects.json")
  .then(r => r.json())
  .then(data => {
    const container = document.getElementById("projects");

    data.forEach(p => {
      const div = document.createElement("div");
      div.className = "border border-gray-700 p-4 rounded";

      div.innerHTML = `
        <h3 class="text-cyan-400 font-bold">${p.id} — ${p.name}</h3>
        <p class="text-gray-400 mt-2">${p.desc}</p>
        <p class="text-gray-600 mt-2 text-sm">Replaces: ${p.replaces}</p>
      `;

      container.appendChild(div);
    });
  });
</script>

</body>
</html>

<!-- PAYMENT BLOCK FIXED -->
<div class="max-w-4xl mx-auto p-6">
<div class="flex flex-col gap-4 mt-10">

  <!-- STRIPE -->
  <a href="https://buy.stripe.com/9B6eV60Gg90Z0TbcZk9fW01"
     class="block bg-green-500 hover:bg-green-400 text-black px-6 py-4 rounded-xl font-bold text-center text-lg">
    Pay with Card — 9,99€
  </a>

  <!-- PAYPAL -->
  <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
      <input type="hidden" name="cmd" value="_xclick">
      <input type="hidden" name="business" value="Aminechabane7@gmail.com">
      <input type="hidden" name="item_name" value="Q-Drop Ultra Vault Access">
      <input type="hidden" name="amount" value="9.99">
      <input type="hidden" name="currency_code" value="EUR">

      <button type="submit"
          class="w-full bg-yellow-500 hover:bg-yellow-400 text-black px-6 py-4 rounded-xl font-bold text-lg">
          Pay with PayPal — 9,99€
      </button>
  </form>

</div>
</div>

</body>
</html>
